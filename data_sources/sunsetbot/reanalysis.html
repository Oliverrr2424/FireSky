<script type="text/javascript">
$(document).ready(function(){
    $("#reana_submit_btn").click(function(){
        // 显示加载状态
        $("#loading").show();

        // 改为直接读取日期输入框的值
        var start_date = $("#start_date").val();  // 格式：YYYY-MM-DD
        var end_date = $("#end_date").val();      // 格式：YYYY-MM-DD
        var event = $("#event").val();
        var city_name = $("#city_name").val();

        var cloud = $("#cloud").val()
        var color = $("#color").val()
        var quality = $("#quality").val()
        var sky = $("#sky").val()
        var url = $("#url").val()

        var intend = "select_event";

        var info = {start_date, end_date, event, city_name, intend, cloud, color, quality, sky, url};
        $.ajax({
            url: "/reanalysis/",
            type: "get",
            data: info,
            error: function(){
                alert("INTERNAL ERROR");
                // 隐藏加载状态
                $("#loading").hide();
            },
            success: function(res) {
                // 隐藏加载状态
                $("#loading").hide();

                if (res.status == "ok") {

                    var container_confusion = document.getElementById('confusion-matrix-container');
                    // 清空之前的卡片
                    container_confusion.innerHTML = '';
                    // 初始化混淆矩阵统计对象
                    const categories = ["基本不烧", "微烧", "小烧", "小到中烧", "中到大烧", "大烧"];
                    const matrix = {};
                    categories.forEach(cat1 => {
                        matrix[cat1] = {};
                        categories.forEach(cat2 => {
                            matrix[cat1][cat2] = 0;
                        });
                    });

                    // 遍历数据并填充卡片和统计混淆矩阵
                    const rows = res.table_content;
                    rows.forEach(row => {
                        // 提取 actual 和 predicted 值
                        const actual = row[4];     // actual_quality
                        const predicted = row[5];  // predicted_quality
                        if (matrix[actual] && matrix[actual][predicted] !== undefined) {
                            matrix[actual][predicted]++;
                        }
                    });

                    // 绘制混淆矩阵
                    drawConfusionMatrix(matrix, categories);

                    var container = document.getElementById('card-results-container');
                    // 清空之前的卡片
                    container.innerHTML = '';
                    // 显示结果卡片
                    rows.forEach(row => {
                        // 假设 row 是一个数组，每个元素依次是：
                        // [日期, 事件, 观测云属, 颜色, 实际质量, 预测质量, 一致性, 天象, 案例, 地图, 大气截面]
                        const date = row[0];
                        const event = row[1];
                        const cloud = row[2];
                        const color = row[3];
                        const actual_quality = row[4];
                        const predicted_quality = row[5];
                        const consistent = row[6];
                        const sky_condition = row[7];
                        const case_url = row[8];   // 可能包含多个 URL \n 分隔
                        const map_url = row[9];    // 可能包含多个 URL \n 分隔
                        const cross_section = row[10]; // 可能是图片地址

                        // 创建卡片外层 div.card
                        const card = document.createElement('div');
                        card.className = 'col-md-4 mb-4';

                        const innerHTML = `
                            <div class="card bg-dark text-light">
                                <div class="card-header border-secondary">
                                    <h5 class="h5-card-header" style="color: #f2e6bb;">${date} - ${event}</h5>
                                </div>
                                <div class="card-body">
                                    <p><strong>观测云属:</strong> ${cloud}</p>
                                    <p><strong>颜色:</strong> ${color}</p>
                                    <p><strong>实际质量:</strong> ${actual_quality}</p>
                                    <p><strong>预测质量:</strong> ${predicted_quality}</p>
                                    <p><strong>一致性:</strong> ${consistent}</p>
                                    <p><strong>天象:</strong> ${sky_condition}</p>

                                    <!-- 案例链接 -->
                                    ${case_url && containsUrl(case_url) ? `
                                        <p><strong>案例资料:</strong></p>
                                        <ul>
                                            ${case_url.split('\n').map((url, index) =>
                                                `<li><a href="${url}" target="_blank">案例${index + 1}</a></li>`
                                            ).join('')}
                                        </ul>
                                    ` : ''}

                                    <!-- 地图链接 -->
                                    ${map_url ? `
                                        <p><strong>地图:</strong></p>
                                        <img src="${map_url}" class="img-fluid reana_img" alt="地图">
                                    ` : ''}

                                    <!-- 图片展示 -->
                                    ${cross_section && containsImg(cross_section) ? `
                                        <p><strong>大气截面图:</strong></p>
                                        <img src="${cross_section}" class="img-fluid reana_img" alt="大气截面图">
                                    ` : ''}


                                </div>
                            </div>
                        `;

                        card.innerHTML = innerHTML;
                        container.appendChild(card);
                    });
                }
                else if (res.status == "not_found"){
                    alert("NO DATA");
                }
            },
        });
    });
});
</script>
