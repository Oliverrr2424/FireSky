    <script type="text/javascript">
    $(document).ready(function(){
        $("#sh_rec_submit_btn").click(function(){
            // 直接读取日期输入框的值
            var start_date = $("#start_date").val();  // 格式：YYYY-MM-DD
            var end_date = $("#end_date").val();      // 格式：YYYY-MM-DD

            var event = $("#event").val()
            var cloud = $("#cloud").val()
            var color = $("#color").val()
            var quality = $("#quality").val()
            var sky = $("#sky").val()
            var url = $("#url").val()
            var intend = "select_event";

            var info = {
                start_date,
                end_date,
                event,
                cloud,
                color,
                quality,
                sky,
                url,
                intend
            };

            $.ajax({
                url: "/record/custom/",
                type: "get",
                data: info,
                error : function(){alert("INTERNAL ERROR");},
                success:function(res) {
                    if (res.status == "ok"){
                        tbody = document.querySelector('#rosy_search_tbody');
                        // 清空表格内容
                        tbody.innerHTML = '';
                        // 动态生成表格内容
                        const rows = res.table_content; // 从第二行开始是数据
                        rows.forEach(row => {
                            const tr = document.createElement('tr');
                            row.forEach(cell => {
                                // 对最后一列含有多个被 \n 分割的 url，将每一个 url 分离出来作为超链接，填写进这个 td 元素
                                if (containsUrl(cell)){
                                    td = convertString2Url(cell);
                                    tr.appendChild(td);
                                }
                                // 其他列直接填入 td 元素
                                else{
                                    const td = document.createElement('td');
                                    td.textContent = cell;
                                    tr.appendChild(td);
                                }
                            });
                            tbody.appendChild(tr);
                        });
                    }
                    else if (res.status == "not_found"){alert("NO DATA");}
                },
            });
        });
    });
    </script>
